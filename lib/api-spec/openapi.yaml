openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Finance Tracker API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: expenses
    description: Expense operations
  - name: categories
    description: Category operations
  - name: summary
    description: Summary and analytics
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /expenses:
    get:
      operationId: listExpenses
      tags: [expenses]
      summary: List all expenses
      parameters:
        - in: query
          name: categoryId
          schema:
            type: ["integer", "null"]
          required: false
        - in: query
          name: month
          schema:
            type: ["string", "null"]
          required: false
          description: Filter by month in YYYY-MM format
      responses:
        "200":
          description: List of expenses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Expense"
    post:
      operationId: createExpense
      tags: [expenses]
      summary: Create a new expense
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateExpenseBody"
      responses:
        "201":
          description: Created expense
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Expense"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /expenses/{id}:
    get:
      operationId: getExpense
      tags: [expenses]
      summary: Get expense by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Expense
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Expense"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateExpense
      tags: [expenses]
      summary: Update an expense
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateExpenseBody"
      responses:
        "200":
          description: Updated expense
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Expense"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteExpense
      tags: [expenses]
      summary: Delete an expense
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List all categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: createCategory
      tags: [categories]
      summary: Create a new category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryBody"
      responses:
        "201":
          description: Created category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /categories/{id}:
    delete:
      operationId: deleteCategory
      tags: [categories]
      summary: Delete a category
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /summary/monthly:
    get:
      operationId: getMonthlySummary
      tags: [summary]
      summary: Get monthly expense summary
      parameters:
        - in: query
          name: month
          schema:
            type: ["string", "null"]
          required: false
          description: Month in YYYY-MM format, defaults to current month
      responses:
        "200":
          description: Monthly summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonthlySummary"

  /summary/by-category:
    get:
      operationId: getSummaryByCategory
      tags: [summary]
      summary: Get expenses grouped by category
      parameters:
        - in: query
          name: month
          schema:
            type: ["string", "null"]
          required: false
          description: Month in YYYY-MM format
      responses:
        "200":
          description: Category breakdown
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategorySummary"

  /summary/recent:
    get:
      operationId: getRecentExpenses
      tags: [summary]
      summary: Get recent expenses (last 10)
      responses:
        "200":
          description: Recent expenses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Expense"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    Category:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        color:
          type: string
        icon:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - color
        - icon
        - createdAt

    CreateCategoryBody:
      type: object
      properties:
        name:
          type: string
        color:
          type: string
        icon:
          type: string
      required:
        - name
        - color
        - icon

    Expense:
      type: object
      properties:
        id:
          type: integer
        amount:
          type: number
        description:
          type: string
        categoryId:
          type: ["integer", "null"]
        categoryName:
          type: ["string", "null"]
        categoryColor:
          type: ["string", "null"]
        categoryIcon:
          type: ["string", "null"]
        date:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - amount
        - description
        - categoryId
        - categoryName
        - categoryColor
        - categoryIcon
        - date
        - createdAt

    CreateExpenseBody:
      type: object
      properties:
        amount:
          type: number
        description:
          type: string
        categoryId:
          type: ["integer", "null"]
        date:
          type: string
          format: date-time
      required:
        - amount
        - description

    UpdateExpenseBody:
      type: object
      properties:
        amount:
          type: number
        description:
          type: string
        categoryId:
          type: ["integer", "null"]
        date:
          type: string
          format: date-time

    MonthlySummary:
      type: object
      properties:
        month:
          type: string
        totalAmount:
          type: number
        expenseCount:
          type: integer
        averageExpense:
          type: number
        topCategory:
          type: ["string", "null"]
      required:
        - month
        - totalAmount
        - expenseCount
        - averageExpense
        - topCategory

    CategorySummary:
      type: object
      properties:
        categoryId:
          type: ["integer", "null"]
        categoryName:
          type: string
        categoryColor:
          type: string
        categoryIcon:
          type: string
        totalAmount:
          type: number
        expenseCount:
          type: integer
        percentage:
          type: number
      required:
        - categoryId
        - categoryName
        - categoryColor
        - categoryIcon
        - totalAmount
        - expenseCount
        - percentage
